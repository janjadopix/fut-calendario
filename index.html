<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fut Calendário 2026</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">⚽</span>
        <h1>FUT CALENDÁRIO <span class="ano">2026</span></h1>
      </div>
      <p class="header-sub">Próximos jogos dos seus times</p>
    </div>
  </header>

  <!-- PRÓXIMO JOGO DESTAQUE -->
  <section class="proximo-destaque" id="proximo-destaque" style="display:none">
    <div class="destaque-label">🔥 PRÓXIMO JOGO</div>
    <div class="destaque-inner" id="destaque-card"></div>
  </section>

  <!-- FILTROS -->
  <div class="filtros-wrapper">
    <div class="filtros-times" id="filtros-times"></div>
    <div class="filtros-camp" id="filtros-camp"></div>
  </div>

  <!-- LISTA DE JOGOS -->
  <main class="jogos" id="lista-jogos"></main>

  <script src="script.js"></script>
</body>
</html>
